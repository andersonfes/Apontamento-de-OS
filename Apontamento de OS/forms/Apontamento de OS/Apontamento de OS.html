<html>

<head>
	<link type="text/css" rel="stylesheet" href="/style-guide/css/fluig-style-guide.min.css" />
	<script type="text/javascript" src="/portal/resources/js/jquery/jquery.js"></script>
	<script type="text/javascript" src="/portal/resources/js/jquery/jquery-ui.min.js"></script>
	<script type="text/javascript" src="/portal/resources/js/mustache/mustache-min.js"></script>
	<script type="text/javascript" src="/style-guide/js/fluig-style-guide.min.js" charset="utf-8"></script>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css">
	<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
</head>

<body>

	<div class="fluig-style-guide">
		<form name="form" role="form">
			<div class="panel panel-info">
				<div class="panel-heading">
					<h3 class="panel-title">
						<span class="fluigicon fluigicon-form fluigicon-md"></span> 
						<b>Apontamento de Ordem de Serviço</b>
					</h3>
				</div>

				<div class="panel-body">
					<div class="form-group">
						<div class="row">

							<div class="hide" style="display: none;">
								<input type="text" class="form-control" id="descritorNome" name="descritorNome">
							</div>

							<div class="col-md-4">
								<label for="nomeTecnico">Nome do Técnico</label>
								<input type="text" class="form-control" name="nomeTecnico" id="nomeTecnico" />
							</div>

							<div class="col-md-4">
								<label for="setorTecnico">Setor do Técnico</label>
								<input type="text" class="form-control" name="setorTecnico" id="setorTecnico" />
							</div>

							<div class="col-md-4">
								<label for="nomeCliente">Nome do Cliente</label>
								<input type="text" class="form-control" name="nomeCliente" id="nomeCliente">
							</div>
						</div>
					</div>


					<div class="form-group">
						<div class="row">
							<div class="col-md-3">
								<label for="tipoAgendamento">Tipo de Agendamento</label>
								<input type="text" class="form-control" name="tipoAgendamento" id="tipoAgendamento">
							</div>

							<div class="col-md-3">
								<label>Data</label>
								<div class="input-group">
									<input class="form-control" type="text" id="modal_dataInicio"
										name="modal_dataInicio" mask="00/00/0000">
									<span class="input-group-addon fs-cursor-pointer">
										<span class="fluigicon fluigicon-calendar"></span>
									</span>
								</div>
							</div>

							<div class="col-md-2">
								<label>Hora inicial</label>
								<input class="form-control" type="time" id="horaInicial" name="horaInicial">
							</div>

							<div class="col-md-2">
								<label>Almoço</label>
								<input class="form-control" type="time" id="almoco" name="almoco">
							</div>

							<div class="col-md-2">
								<label>Hora Final</label>
								<input class="form-control" type="time" id="horaFinal" name="horaFinal">
							</div>

							<div class="col-md-2">
								<label>Total de Horas</label>
								<input class="form-control" type="text" id="totalHoras" name="totalHoras">
							</div>

						</div>
					</div>

					<div class="form-group">
						<div class="row">
							<div class="col-md-12">
								<label>Tarefas Realizadas</label>
								<textarea class="form-control" name="tarefasRealizadas" id="tarefasRealizadas"
									rows="3"></textarea>
							</div>
						</div>
					</div>
				</div>
		</form>
	</div>
</body>

</html>
